<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - QuickBite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="relative">

    <header class="bg-white shadow-md sticky top-0 z-50">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center relative">
            <a href="index.html" class="text-2xl font-bold text-orange-600">QuickBite</a>
            <div class="hidden md:flex items-center space-x-8">
                <a href="index.html" class="text-gray-600 hover:text-orange-600 transition-colors">Home</a>
                <a href="restaurants.html" class="text-gray-600 hover:text-orange-600 transition-colors">Restaurants</a>
                <a href="deals.html" class="text-gray-600 hover:text-orange-600 transition-colors">Deals</a>
                 <a href="orders.html" class="relative text-gray-600 hover:text-orange-600 transition-colors" title="Order History">
                    <i class="fas fa-receipt text-xl"></i>
                </a>
                <div class="relative text-gray-400 cursor-not-allowed" title="Cart unavailable during checkout">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cart-count" class="absolute -top-2 -right-3 bg-gray-400 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">0</span>
                </div>
                 <a href="#" class="bg-orange-600 text-white px-5 py-2 rounded-full hover:bg-orange-700 transition-colors">Sign In</a>
            </div>
             <button id="mobile-menu-button" class="md:hidden flex items-center text-gray-400 cursor-not-allowed">
                 <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
        </nav>
         <div id="mobile-menu" class="hidden md:hidden bg-white py-4">
             <a href="index.html" class="block text-gray-600 hover:bg-orange-50 px-6 py-2">Home</a>
             <a href="restaurants.html" class="block text-gray-600 hover:bg-orange-50 px-6 py-2">Restaurants</a>
             <a href="deals.html" class="block text-gray-600 hover:bg-orange-50 px-6 py-2">Deals</a>
              <a href="orders.html" class="block text-gray-600 hover:bg-orange-50 px-6 py-2"><i class="fas fa-receipt mr-2"></i>Order History</a>
             <a href="#" id="mobile-cart-btn" class="block text-gray-400 cursor-not-allowed px-6 py-2 relative"><i class="fas fa-shopping-cart mr-2"></i>Cart <span id="mobile-cart-count" class="absolute top-2 right-6 bg-gray-400 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">0</span></a>
             <a href="#" class="block bg-orange-600 text-white mx-6 my-2 px-5 py-2 rounded-full text-center">Sign In</a>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12 min-h-[60vh]">
        <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-8">Checkout Summary</h1>

        <div id="checkout-summary" class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-2xl font-semibold text-gray-700 mb-4 border-b pb-2">Your Order</h2>
            <div id="checkout-items" class="space-y-3 mb-4">
                <p class="text-gray-500">Loading your order...</p>
            </div>
            <div class="border-t pt-4 flex justify-between items-center">
                <span class="text-xl font-medium text-gray-800">Total:</span>
                <span id="checkout-total" class="text-2xl font-bold text-orange-600">₹0</span>
            </div>
        </div>

        <div id="confirmation-message" class="hidden text-center bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative" role="alert">
            <strong class="font-bold">Order Placed Successfully!</strong>
            <span class="block sm:inline"> Thank you for your order.</span>
            <p class="mt-4"><a href="index.html" class="text-orange-600 hover:underline font-semibold">Return to Homepage</a></p>
        </div>

        <div id="place-order-section" class="text-center">
            <button id="place-order-btn" class="bg-green-600 text-white px-8 py-3 rounded-full font-semibold hover:bg-green-700 transition-colors text-lg">
                Place Order
            </button>
        </div>

    </main>

    <footer class="bg-gray-800 text-white py-10 mt-16">
       <div class="container mx-auto px-6"><div class="border-t border-gray-700 pt-6 flex flex-col md:flex-row justify-between items-center"><p class="text-gray-400 text-center md:text-left mb-4 md:mb-0">&copy; 2025 QuickBite. All rights reserved.</p><div class="flex space-x-4"><a href="#" class="text-gray-400 hover:text-white"><i class="fab fa-facebook-f"></i></a><a href="#" class="text-gray-400 hover:text-white"><i class="fab fa-twitter"></i></a><a href="#" class="text-gray-400 hover:text-white"><i class="fab fa-instagram"></i></a></div></div></div>
    </footer>
    
    <script src="data.js"></script> <script src="main.js"></script>
</body>
</html>
