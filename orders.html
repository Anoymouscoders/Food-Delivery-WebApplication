<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - QuickBite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        html {
            scroll-behavior: smooth;
        }
         .modal-overlay, #cart-panel {
            transition: opacity 0.3s ease-in-out;
        }
        .modal-content, #cart-panel-content {
            transition: transform 0.3s ease-in-out;
        }
        #cart-panel {
            transition: transform 0.3s ease-in-out;
        }
    </style>
</head>
<body class="relative">

    <header class="bg-white shadow-md sticky top-0 z-50">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center relative">
            <a href="index.html" class="text-2xl font-bold text-orange-600">QuickBite</a>
            <div class="hidden md:flex items-center space-x-8">
                <a href="index.html" class="text-gray-600 hover:text-orange-600 transition-colors">Home</a>
                <a href="restaurants.html" class="text-gray-600 hover:text-orange-600 transition-colors">Restaurants</a>
                <a href="deals.html" class="text-gray-600 hover:text-orange-600 transition-colors">Deals</a>
                <a href="orders.html" class="relative text-orange-600 font-semibold border-b-2 border-orange-600 pb-1" title="Order History">
                    <i class="fas fa-receipt text-xl"></i>
                </a>
                <button id="cart-icon-btn" class="relative text-gray-600 hover:text-orange-600 transition-colors" title="View Cart">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cart-count" class="absolute -top-2 -right-3 bg-orange-600 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">0</span>
                </button>
                <a href="#" class="bg-orange-600 text-white px-5 py-2 rounded-full hover:bg-orange-700 transition-colors">Sign In</a>
            </div>
            <button id="mobile-menu-button" class="md:hidden flex items-center">
                 <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
        </nav>
        <div id="mobile-menu" class="hidden md:hidden bg-white py-4">
            <a href="index.html" class="block text-gray-600 hover:bg-orange-50 px-6 py-2">Home</a>
            <a href="restaurants.html" class="block text-gray-600 hover:bg-orange-50 px-6 py-2">Restaurants</a>
            <a href="deals.html" class="block text-gray-600 hover:bg-orange-50 px-6 py-2">Deals</a>
             <a href="orders.html" class="block text-orange-600 bg-orange-50 px-6 py-2"><i class="fas fa-receipt mr-2"></i>Order History</a>
            <a href="#" id="mobile-cart-btn" class="block text-gray-600 hover:bg-orange-50 px-6 py-2 relative"><i class="fas fa-shopping-cart mr-2"></i>Cart <span id="mobile-cart-count" class="absolute top-2 right-6 bg-orange-600 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">0</span></a>
            <a href="#" class="block bg-orange-600 text-white mx-6 my-2 px-5 py-2 rounded-full text-center">Sign In</a>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12 min-h-[60vh]">
        <h1 id="orders-title" class="text-3xl md:text-4xl font-bold text-gray-800 mb-8">Your Order History</h1>

        <div id="order-history-container" class="space-y-6">
            <p id="loading-orders" class="text-gray-500">Loading order history...</p>
        </div>

    </main>

    <footer class="bg-gray-800 text-white py-10 mt-16">
       <div class="container mx-auto px-6"><div class="border-t border-gray-700 pt-6 flex flex-col md:flex-row justify-between items-center"><p class="text-gray-400 text-center md:text-left mb-4 md:mb-0">&copy; 2025 QuickBite. All rights reserved.</p><div class="flex space-x-4"><a href="#" class="text-gray-400 hover:text-white"><i class="fab fa-facebook-f"></i></a><a href="#" class="text-gray-400 hover:text-white"><i class="fab fa-twitter"></i></a><a href="#" class="text-gray-400 hover:text-white"><i class="fab fa-instagram"></i></a></div></div></div>
    </footer>
    
    <button id="scroll-to-top" class="hidden fixed bottom-6 right-6 bg-orange-600 text-white w-12 h-12 rounded-full shadow-lg hover:bg-orange-700 transition-colors flex items-center justify-center z-50"><i class="fas fa-arrow-up"></i></button>

    <div id="cart-panel" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[60] opacity-0"><div id="cart-panel-content" class="fixed top-0 right-0 h-full w-full max-w-md bg-white shadow-2xl transform translate-x-full flex flex-col"><div class="p-6 flex justify-between items-center border-b"><h2 class="text-2xl font-bold text-gray-800">Your Cart</h2><button id="close-cart-btn" class="text-gray-500 hover:text-gray-800"><i class="fas fa-times text-2xl"></i></button></div><div id="cart-items-container" class="flex-grow p-6 overflow-y-auto"></div><div class="p-6 border-t"><div class="flex justify-between items-center mb-4"><span class="text-lg font-medium text-gray-700">Subtotal:</span><span id="cart-subtotal" class="text-xl font-bold text-gray-900">₹0</span></div><button id="checkout-btn" class="w-full bg-orange-600 text-white py-3 rounded-full font-semibold hover:bg-orange-700 transition-colors">Proceed to Checkout</button></div></div></div>
    
    <script src="data.js"></script> 
    <script src="main.js"></script>
</body>
</html>
